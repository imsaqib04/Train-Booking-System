spring.application.name=Auth-Service

# DATABASE CONFIGURATION
spring.datasource.url=jdbc:mysql://localhost:3306/AuthService
spring.datasource.username=root
spring.datasource.password=Admin

# DRIVER AND DIALECT
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JPA SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8091

#jwt.secret=3fsj348shxkv94vx93s9xjd02s

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=192.168.1.10
eureka.instance.prefer-ip-address=true

#spring.security.user.name=admin
#spring.security.user.password=secret123


logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


spring.security.oauth2.client.registration.google.client-id
spring.security.oauth2.client.registration.google.client-secret
spring.security.oauth2.client.registration.google.redirect-uri
spring.security.oauth2.client.registration.google.scope

spring.security.oauth2.client.registration.github.client-id
spring.security.oauth2.client.registration.github.client-secret
spring.security.oauth2.client.registration.github.redirect-uri
spring.security.oauth2.client.registration.github.scope


